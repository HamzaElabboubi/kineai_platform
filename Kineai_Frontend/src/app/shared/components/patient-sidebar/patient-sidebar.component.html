<aside class="w-52 bg-white border-r border-gray-200
              flex flex-col fixed h-full z-10">

  <div class="px-5 py-5 border-b border-gray-100">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-blue-600 rounded-lg
                  flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0z
                   M12 14a7 7 0 00-7 7h14a7 7 0
                   00-7-7z"/>
        </svg>
      </div>
      <div>
        <p class="font-bold text-gray-900 text-sm
                  leading-none">KinéAI</p>
        <p class="text-xs text-blue-600 mt-0.5">
          Patient
        </p>
      </div>
    </div>
  </div>

  <nav class="flex-1 px-3 py-4">
    <div class="flex flex-col gap-1">

      <a routerLink="/patient/dashboard"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1
                   1 0 001 1h3m10-11l2 2m-2-2v10a1
                   1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1
                   1 0 011-1h2a1 1 0 011 1v4a1 1 0
                   001 1m-6 0h6"/>
        </svg>
        Accueil
      </a>

      <a routerLink="/patient/session"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M14.752 11.168l-3.197-2.132A1 1 0
                   00010 9.87v4.263a1 1 0 001.555.832
                   l3.197-2.132a1 1 0 000-1.664zM21
                   12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Mes séances
      </a>

      <a routerLink="/patient/progress"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0
                   00-2 2v6a2 2 0 002 2h2a2 2 0
                   002-2zm0 0V9a2 2 0 012-2h2a2 2
                   0 012 2v10m-6 0a2 2 0 002 2h2a2
                   2 0 002-2m0 0V5a2 2 0 012-2h2a2
                   2 0 012 2v14a2 2 0 01-2 2h-2a2
                   2 0 01-2-2z"/>
        </svg>
        Mes progrès
      </a>

      <a routerLink="/patient/messages"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M8 10h.01M12 10h.01M16 10h.01M9
                   16H5a2 2 0 01-2-2V6a2 2 0 012-2h14
                   a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5
                   5v-5z"/>
        </svg>
        Messages
      </a>
      <a routerLink="/patient/badges"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0
                   00-2 2v6a2 2 0 002 2h2a2 2 0
                   002-2zm0 0V9a2 2 0 012-2h2a2 2
                   0 012 2v10m-6 0a2 2 0 002 2h2a2
                   2 0 002-2m0 0V5a2 2 0 012-2h2a2
                   2 0 012 2v14a2 2 0 01-2 2h-2a2
                   2 0 01-2-2z"/>
        </svg>
        Mes badges
      </a>

      <a routerLink="/patient/profile"
        routerLinkActive="bg-blue-50 text-blue-700 font-medium"
        class="flex items-center gap-3 px-3 py-2.5
             rounded-lg text-sm text-gray-500
             hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0z
                   M12 14a7 7 0 00-7 7h14a7 7 0
                   00-7-7z"/>
        </svg>
        Mon profil
      </a>
    </div>
  </nav>

  <div class="px-3 mt-auto mb-4">
    <button (click)="logout()"
            aria-label="Se déconnecter"
            class="w-full flex items-center justify-center gap-2
                   px-3 py-2 rounded-lg text-sm font-medium
                   bg-red-50 text-red-600 hover:bg-red-100
                   hover:text-red-700 transition-colors
                   border border-transparent focus:outline-none
                   focus:ring-2 focus:ring-red-200">
      <svg class="w-4 h-4" fill="none"
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round"
              stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3
                 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0
                 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Déconnexion
    </button>

    </div>
  

  <div class="mx-3 mb-4 bg-blue-50 rounded-xl p-3">
    <div class="flex items-start gap-2">
      <div class="w-6 h-6 bg-white rounded-full
                  flex items-center justify-center
                  flex-shrink-0 mt-0.5">
        <svg class="w-3.5 h-3.5 text-blue-600"
             fill="none" viewBox="0 0 24 24"
             stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M8.228 9c.549-1.165 2.03-2 3.772-2
                   2.21 0 4 1.343 4 3 0 1.4-1.278
                   2.575-3.006 2.907-.542.104-.994.54
                   -.994 1.093m0 3h.01M21 12a9 9 0
                   11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div>
        <p class="text-xs font-medium text-blue-700">
          Besoin d'aide ?
        </p>
        <p class="text-xs text-blue-500 mt-0.5
                  leading-relaxed">
          Contactez votre kinésithérapeute
        </p>
      </div>
    </div>
  </div>

</aside>
