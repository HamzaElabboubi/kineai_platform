<aside class="w-56 bg-white border-r border-gray-100
              flex flex-col fixed h-full z-10">

  <div class="px-5 py-5">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 bg-blue-600 rounded-lg
                  flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12
                   20.364l7.682-7.682a4.5 4.5 0
                   00-6.364-6.364L12 7.636l-1.318-1.318
                   a4.5 4.5 0 00-6.364 0z"/>
        </svg>
      </div>
      <div>
        <p class="font-bold text-gray-900 text-sm
                  leading-none">
          KINEAI
        </p>
        <p class="text-xs text-gray-400 mt-0.5">
          Espace Kiné
        </p>
      </div>
    </div>
  </div>

  <nav class="flex-1 px-3 pt-2">
    <div class="flex flex-col gap-0.5">

      <a routerLink="/kine/dashboard"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1
                   1 0 001 1h3m10-11l2 2m-2-2v10a1
                   1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1
                   1 0 011-1h2a1 1 0 011 1v4a1 1 0
                   001 1m-6 0h6"/>
        </svg>
        Tableau de bord
      </a>

      <a routerLink="/kine/patients"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0z
                   M12 14a7 7 0 00-7 7h14a7 7 0
                   00-7-7z"/>
        </svg>
        Mes patients
      </a>

      <a routerLink="/kine/alerts"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032
                   0 0118 14.158V11a6.002 6.002 0
                   00-4-5.659V5a2 2 0 10-4 0v.341
                   C7.67 6.165 6 8.388 6 11v3.159
                   c0 .538-.214 1.055-.595 1.436L4
                   17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        Alertes
        @if (pendingCount() > 0) {
          <span class="ml-auto text-xs bg-red-500
                       text-white px-1.5 py-0.5
                       rounded-full">
            {{ pendingCount() }}
          </span>
        }
      </a>

    </div>
  </nav>

  <button (click)="logout()"
          class="flex items-center gap-3 px-3 py-3
                 mx-3 mb-4 text-sm text-gray-400
                 hover:text-red-500 transition-colors">
    <svg class="w-4 h-4" fill="none"
         viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round"
            stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3
               3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0
               013-3h4a3 3 0 013 3v1"/>
    </svg>
    Déconnexion
  </button>

</aside>
