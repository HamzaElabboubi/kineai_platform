@if (sidebar.isOpen()) {
  <div class="fixed inset-0 bg-black/40 z-30 lg:hidden"
       (click)="sidebar.close()"></div>
}

<aside class="w-64 lg:w-56 bg-white border-r border-gray-100
              flex flex-col fixed h-full z-40
              transition-transform duration-200
              lg:translate-x-0"
       [class.-translate-x-full]="!sidebar.isOpen()">

  <div class="px-5 py-5 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 bg-blue-600 rounded-lg
                  flex items-center justify-center">
        <img [src]="logoUrl" [alt]="'Logo'"
             class="w-5 h-5 text-white"
             />

      </div>
      <span class="font-bold text-gray-900 text-base">
        KINEAI
      </span>
      <span class="text-xs bg-blue-50 text-blue-600
                   px-2 py-0.5 rounded-full">
        Admin
      </span>
    </div>
    <button type="button"
            (click)="sidebar.close()"
            aria-label="Fermer le menu"
            class="lg:hidden w-8 h-8 flex items-center
                   justify-center rounded-lg text-gray-400
                   hover:bg-gray-50 hover:text-gray-600
                   flex-shrink-0">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
              stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <nav class="flex-1 px-3 pt-2">
    <div class="flex flex-col gap-0.5">

      <a routerLink="/admin/dashboard"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         [routerLinkActiveOptions]="{exact: true}"
         (click)="sidebar.close()"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1
                   1 0 001 1h3m10-11l2 2m-2-2v10a1
                   1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1
                   1 0 011-1h2a1 1 0 011 1v4a1 1 0
                   001 1m-6 0h6"/>
        </svg>
        Tableau de bord
      </a>

      <a routerLink="/admin/kines"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         (click)="sidebar.close()"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0z
                   M12 14a7 7 0 00-7 7h14a7 7 0
                   00-7-7z"/>
        </svg>
        Kinésithérapeutes
        @if (pendingCount() > 0) {
          <span class="ml-auto text-xs bg-red-500
                       text-white px-1.5 py-0.5
                       rounded-full">
            {{ pendingCount() }}
          </span>
        }
      </a>

      <a routerLink="/admin/patients"
         routerLinkActive="bg-blue-50 text-blue-700 font-medium"
         (click)="sidebar.close()"
         class="flex items-center gap-3 px-3 py-2.5
                rounded-lg text-sm text-gray-500
                hover:bg-gray-50 transition-colors">
        <svg class="w-4 h-4" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round"
                stroke-linejoin="round" stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857
                   M17 20H7m10 0v-2c0-.656-.126-1.283
                   -.356-1.857M7 20H2v-2a3 3 0
                   015.356-1.857M7 20v-2c0-.656.126
                   -1.283.356-1.857m0 0a5.002 5.002
                   0 019.288 0M15 7a3 3 0 11-6 0
                   3 3 0 016 0z"/>
        </svg>
        Patients
      </a>

    </div>
  </nav>

  <button (click)="logout()"
          class="flex items-center gap-3 px-3 py-3
                 mx-3 mb-4 text-sm text-red-500
                 hover:text-red-600 transition-colors">
    <svg class="w-4 h-4" fill="none"
         viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round"
            stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3
               3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0
               013-3h4a3 3 0 013 3v1"/>
    </svg>
    Déconnexion
  </button>

</aside>
