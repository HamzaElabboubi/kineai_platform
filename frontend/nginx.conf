server {
    listen 80;
    server_name kineai.online www.kineai.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name kineai.online www.kineai.online;

    ssl_certificate /etc/letsencrypt/live/kineai.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kineai.online/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # ← AJOUTER ce bloc proxy API
    location /api/ {
        proxy_pass http://KINEAI-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml
               application/xml application/xml+rss
               text/javascript;
}