# ════════════════════════════════════════════
# Pipeline CI/CD — KINEAI
# Déclenché à chaque push ou pull request sur
# la branche main
# ════════════════════════════════════════════

name: KINEAI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ──────────────────────────────────────────
  # JOB 1 — Tests unitaires Backend
  # Exécute la suite complète des 80 tests
  # unitaires JUnit/Mockito avec rapport JaCoCo
  # ──────────────────────────────────────────
  backend-tests:
    name: Tests unitaires Spring Boot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configuration JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Exécution des tests unitaires
        working-directory: ./backend
        run: mvn clean test -B

      - name: Génération du rapport JaCoCo
        working-directory: ./backend
        run: mvn jacoco:report -B

      - name: Publication du rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 7

  # ──────────────────────────────────────────
  # JOB 2 — Build Backend Docker
  # Vérifie que l'image backend se construit
  # correctement — exécuté uniquement si les
  # tests passent
  # ──────────────────────────────────────────
  backend-build:
    name: Build image Docker Backend
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: kineai-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # JOB 3 — Build Frontend Docker
  # Vérifie que le build Angular + nginx se
  # construit correctement en parallèle du
  # backend
  # ──────────────────────────────────────────
  frontend-build:
    name: Build image Docker Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: kineai-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max